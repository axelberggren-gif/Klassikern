<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- K letterform -->
  <g fill="white">
    <!-- Vertical stroke -->
    <rect x="140" y="112" width="56" height="288" rx="8"/>
    <!-- Upper diagonal -->
    <polygon points="212,256 340,120 408,120 408,128 248,280"/>
    <!-- Lower diagonal -->
    <polygon points="248,232 408,384 408,392 340,392 212,256"/>
    <!-- Thicken upper diagonal -->
    <polygon points="196,268 196,232 370,112 410,136 240,268"/>
    <!-- Thicken lower diagonal -->
    <polygon points="240,244 410,376 370,400 196,244 196,232"/>
  </g>
  <!-- Four small sport icons as dots along bottom -->
  <circle cx="176" cy="432" r="12" fill="rgba(255,255,255,0.5)"/>
  <circle cx="224" cy="432" r="12" fill="rgba(255,255,255,0.6)"/>
  <circle cx="272" cy="432" r="12" fill="rgba(255,255,255,0.7)"/>
  <circle cx="320" cy="432" r="12" fill="rgba(255,255,255,0.8)"/>
</svg>